<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Generator</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body class="bg-gradient-to-br from-slate-100 via-blue-100 to-indigo-100 min-h-screen py-10">

<div class="max-w-5xl mx-auto px-5">

    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->

        <div class="bg-gradient-to-r from-blue-700 via-indigo-700 to-purple-700 p-10 text-white">

            <h1 class="text-4xl font-bold">
                Resume Builder
            </h1>

            <p class="mt-2 text-blue-100">
                Fill your details and generate a professional ATS Friendly Resume.
            </p>

        </div>

        <form method="POST" class="p-10 space-y-8">

            {% csrf_token %}

            <!-- Personal Information -->

            <div class="bg-gray-50 rounded-2xl p-8 shadow">

                <h2 class="text-2xl font-bold text-blue-700 mb-6">
                    👤 Personal Information
                </h2>

                <div class="grid md:grid-cols-2 gap-6">

                    <!-- Name -->

                    <div>

                        <label class="font-semibold text-gray-700 mb-2 block">
                            Full Name
                        </label>

                        <div class="relative">

                            <i class="fa-solid fa-user absolute left-4 top-4 text-gray-400"></i>

                            <input
                            type="text"
                            name="name"
                            placeholder="John Doe"
                            class="pl-12 w-full rounded-xl border border-gray-300 px-4 py-3 focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none transition">

                        </div>

                    </div>

                    <!-- Email -->

                    <div>

                        <label class="font-semibold text-gray-700 mb-2 block">
                            Email
                        </label>

                        <div class="relative">

                            <i class="fa-solid fa-envelope absolute left-4 top-4 text-gray-400"></i>

                            <input
                            type="email"
                            name="email"
                            placeholder="john@gmail.com"
                            class="pl-12 w-full rounded-xl border border-gray-300 px-4 py-3 focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none transition">

                        </div>

                    </div>

                    <!-- Phone -->

                    <div>

                        <label class="font-semibold text-gray-700 mb-2 block">
                            Phone
                        </label>

                        <div class="relative">

                            <i class="fa-solid fa-phone absolute left-4 top-4 text-gray-400"></i>

                            <input
                            type="text"
                            name="phone"
                            placeholder="+91 9876543210"
                            class="pl-12 w-full rounded-xl border border-gray-300 px-4 py-3 focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none transition">

                        </div>

                    </div>

                    <!-- Degree -->

                    <div>

                        <label class="font-semibold text-gray-700 mb-2 block">
                            Degree
                        </label>

                        <div class="relative">

                            <i class="fa-solid fa-graduation-cap absolute left-4 top-4 text-gray-400"></i>

                            <input
                            type="text"
                            name="degree"
                            placeholder="B.Tech Computer Science"
                            class="pl-12 w-full rounded-xl border border-gray-300 px-4 py-3 focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none transition">

                        </div>

                    </div>

                </div>

            </div>

            <!-- Education -->

            <div class="bg-gray-50 rounded-2xl p-8 shadow">

                <h2 class="text-2xl font-bold text-blue-700 mb-6">
                    🎓 Education
                </h2>

                <div class="grid md:grid-cols-2 gap-6">

                    <div>

                        <label class="font-semibold mb-2 block">
                            School
                        </label>

                        <input
                        type="text"
                        name="school"
                        placeholder="ABC School"
                        class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none">

                    </div>

                    <div>

                        <label class="font-semibold mb-2 block">
                            University
                        </label>

                        <input
                        type="text"
                        name="university"
                        placeholder="XYZ University"
                        class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none">

                    </div>

                </div>

            </div>

            <!-- Summary -->

            <div class="bg-gray-50 rounded-2xl p-8 shadow">

                <h2 class="text-2xl font-bold text-blue-700 mb-6">
                    📝 Professional Summary
                </h2>

                <textarea
                name="summary"
                rows="5"
                placeholder="Tell recruiters about yourself..."
                class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none"></textarea>

            </div>

            <!-- Experience -->

            <div class="bg-gray-50 rounded-2xl p-8 shadow">

                <h2 class="text-2xl font-bold text-blue-700 mb-6">
                    💼 Previous Work
                </h2>

                <textarea
                name="previous_work"
                rows="6"
                placeholder="Describe your previous work experience..."
                class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none"></textarea>

            </div>

            <!-- Skills -->

            <div class="bg-gray-50 rounded-2xl p-8 shadow">

                <h2 class="text-2xl font-bold text-blue-700 mb-6">
                    🛠 Skills
                </h2>

                <input
                type="text"
                name="skills"
                placeholder="Python, Django, SQL, AWS, Docker..."
                class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:ring-4 focus:ring-blue-200 focus:border-blue-600 outline-none">

                <p class="text-sm text-gray-500 mt-2">
                    Separate each skill with a comma.
                </p>

            </div>

            <!-- Button -->

            <div class="text-center">

                <button
                type="submit"
                class="bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-indigo-700 hover:to-blue-700 text-white font-semibold text-lg px-10 py-4 rounded-xl shadow-lg hover:shadow-2xl transition duration-300 hover:-translate-y-1">

                    <i class="fa-solid fa-file-lines mr-2"></i>

                    Generate Resume

                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
